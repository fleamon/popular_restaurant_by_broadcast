# Vercel 배포는 Vercel 프로젝트에 GitHub 저장소를 연결하면 자동으로 동작합니다.
# 이 워크플로는 타입체크/빌드 검증을 PR 단계에서 돌리기 위한 CI 용.
name: web-ci

on:
  pull_request:
    paths: ["app/web/**", ".github/workflows/web-deploy.yml"]
  push:
    branches: [main]
    paths: ["app/web/**"]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/web/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_KAKAO_JS_KEY: ${{ secrets.NEXT_PUBLIC_KAKAO_JS_KEY }}
          NEXT_PUBLIC_API_BASE_URL: ${{ secrets.NEXT_PUBLIC_API_BASE_URL }}
