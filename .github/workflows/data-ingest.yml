# 수동 트리거 데이터 수집 워크플로 — YouTube 채널 자동 수집.
# Repo → Actions → "data-ingest" → Run workflow 로 핸들/영상수 입력 후 실행.
#
# 진입점은 `python -m data.ingest_channels` (저장소 루트 기준 실행 — relative import 가
# app.api.services 를 끌어오므로 working-directory 를 data 로 잡으면 안 됨).
name: data-ingest

on:
  workflow_dispatch:
    inputs:
      handles:
        description: "수집할 채널 핸들/URL (공백 구분, 예: @sungsikyung @bimirya)"
        required: true
        type: string
      max_videos:
        description: "채널당 최신 영상 수 (1~1000)"
        required: true
        default: "100"
        type: string

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            app/api/requirements.txt
            data/requirements.txt
      # ingest_channels 는 app.api.services 를 import → 두 의존성 모두 필요.
      - run: |
          pip install -r app/api/requirements.txt
          pip install -r data/requirements.txt
      - name: Run ingest
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python -m data.ingest_channels ${{ inputs.handles }} --max-videos ${{ inputs.max_videos }}
      - name: Upload ingest log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ingest-log
          path: data/logs/*.log
